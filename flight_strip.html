<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Strip</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap');

  :root {
    --bg: #0a0c10;
    --panel: #0f1318;
    --border: #1e2530;
    --accent: #00d4aa;
    --accent2: #f0a500;
    --dim: #3a4555;
    --text: #c8d8e8;
    --muted: #5a7080;
    --strip-bg: #0d1a14;
    --strip-border: #00d4aa;
    --danger: #ff4444;
    --simbrief: #1a6ef5;
    --field-bg: rgba(0,212,170,0.06);
    --field-border: rgba(0,212,170,0.22);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow Condensed', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

  /* ── Header ── */
  header { border-bottom: 1px solid var(--border); padding: 14px 26px; display: flex; align-items: center; gap: 13px; background: var(--panel); }
  .logo-mark { width: 32px; height: 32px; border: 2px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--accent); flex-shrink: 0; }
  header h1 { font-size: 19px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; }
  header h1 span { color: var(--accent); }
  .save-badge { margin-left: auto; font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--accent); letter-spacing: 1px; opacity: 0; transition: opacity 0.4s; }
  .save-badge.show { opacity: 1; }

  /* ── Layout ── */
  main { flex: 1; display: grid; grid-template-columns: 320px 1fr; }

  /* ── Left panel ── */
  .left-panel { border-right: 1px solid var(--border); padding: 22px 16px; display: flex; flex-direction: column; gap: 18px; background: var(--panel); overflow-y: auto; }
  .section-label { font-size: 10px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }

  .sb-input { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 6px; padding: 11px 13px; color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 13px; width: 100%; outline: none; transition: border-color 0.2s; }
  .sb-input:focus { border-color: var(--simbrief); }
  .sb-input::placeholder { color: var(--dim); }

  .btn-sb { background: var(--simbrief); color: #fff; border: none; border-radius: 6px; padding: 12px; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; width: 100%; transition: opacity 0.2s; margin-top: 5px; }
  .btn-sb:hover:not(:disabled) { opacity: 0.85; }
  .btn-sb:disabled { opacity: 0.35; cursor: not-allowed; }
  .sb-hint { font-size: 11px; color: var(--muted); line-height: 1.6; padding: 8px 10px; background: rgba(26,110,245,0.06); border: 1px solid rgba(26,110,245,0.2); border-radius: 6px; }

  .unit-toggle { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .unit-btn { flex: 1; padding: 8px 4px; text-align: center; font-family: 'Share Tech Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 1px; cursor: pointer; background: transparent; border: none; border-right: 1px solid var(--border); color: var(--muted); transition: background 0.15s, color 0.15s; }
  .unit-btn:last-child { border-right: none; }
  .unit-btn.active { background: var(--accent2); color: #000; }

  .btn-generate { background: var(--accent); color: #000; border: none; border-radius: 6px; padding: 13px; font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; width: 100%; transition: opacity 0.2s, transform 0.1s; }
  .btn-generate:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  .btn-generate:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-clear { background: transparent; border: 1px solid var(--dim); color: var(--muted); border-radius: 6px; padding: 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; width: 100%; transition: border-color 0.2s, color 0.2s; }
  .btn-clear:hover { border-color: var(--danger); color: var(--danger); }

  .loading-bar { height: 2px; background: linear-gradient(90deg, transparent, var(--simbrief), transparent); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 2px; display: none; margin-top: 5px; }
  .loading-bar.active { display: block; }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

  .status-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 6px; padding: 11px; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--muted); min-height: 58px; max-height: 95px; overflow-y: auto; line-height: 1.8; }
  .status-box .ok   { color: var(--accent); }
  .status-box .warn { color: var(--accent2); }
  .status-box .err  { color: var(--danger); }

  /* ── Right panel ── */
  .right-panel { padding: 26px 30px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
  .strip-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .strip-header h2 { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
  .strip-actions { display: flex; gap: 7px; }
  .btn-action { background: transparent; border: 1px solid var(--dim); color: var(--text); border-radius: 4px; padding: 5px 13px; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 1px; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
  .btn-action:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Strip card ── */
  .strip-card { background: var(--strip-bg); border: 1px solid var(--strip-border); border-radius: 10px; padding: 22px 26px; box-shadow: 0 0 36px rgba(0,212,170,0.07); font-family: 'Share Tech Mono', monospace; font-size: 13px; }
  .strip-placeholder { border: 1px dashed var(--dim); border-radius: 10px; padding: 80px 32px; text-align: center; color: var(--muted); font-size: 14px; line-height: 2.4; }
  .strip-placeholder .big { font-size: 44px; display: block; margin-bottom: 14px; opacity: 0.2; }

  /* ── Strip rows & elements ── */
  .strip-row { display: flex; align-items: center; gap: 5px; padding: 4px 0; flex-wrap: wrap; }
  .strip-sep { border: none; border-top: 1px solid rgba(0,212,170,0.18); margin: 3px 0; }
  .strip-label { color: var(--muted); white-space: nowrap; font-size: 13px; }
  .strip-value { color: var(--accent); font-size: 13px; white-space: nowrap; }
  .strip-static { color: var(--text); font-size: 13px; }
  .strip-title-row { display: flex; align-items: center; gap: 7px; padding: 2px 0 6px; flex-wrap: wrap; }

  /* ── Editable fields ── */
  .sf {
    background: var(--field-bg);
    border: 1px solid var(--field-border);
    border-radius: 3px;
    color: var(--accent2);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 2px 5px;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
    min-width: 28px;
  }
  .sf:focus { border-color: var(--accent2); background: rgba(240,165,0,0.1); }
  .sf.w40  { width: 40px; }
  .sf.w50  { width: 50px; }
  .sf.w60  { width: 60px; }
  .sf.w70  { width: 70px; }
  .sf.w90  { width: 90px; }
  .sf.w110 { width: 110px; }
  .sf.xw   { flex: 1; min-width: 100px; }
  .sf.ta   { width: 100%; resize: vertical; min-height: 34px; padding: 4px 6px; line-height: 1.45; }
  .sf.ta-sm { min-height: 28px; }

  /* step climbs table */
  .step-table { width: 100%; border-collapse: collapse; margin-top: 4px; }
  .step-table th { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding: 2px 6px; text-align: left; font-weight: 400; }
  .step-table td { padding: 2px 4px; }
  .step-table .sf { width: 100%; }
  .btn-add-step { background: transparent; border: 1px dashed var(--dim); color: var(--muted); border-radius: 4px; padding: 4px 10px; font-family: 'Share Tech Mono', monospace; font-size: 11px; cursor: pointer; transition: border-color 0.2s, color 0.2s; margin-top: 5px; }
  .btn-add-step:hover { border-color: var(--accent); color: var(--accent); }
  .btn-del-step { background: transparent; border: none; color: var(--dim); font-size: 14px; cursor: pointer; padding: 0 4px; line-height: 1; }
  .btn-del-step:hover { color: var(--danger); }

  /* times row */
  .times-grid { display: grid; grid-template-columns: auto auto auto auto; gap: 4px 10px; align-items: center; padding: 4px 0; }
  .tg-label { color: var(--muted); font-size: 13px; white-space: nowrap; }

  /* notes */
  .notes-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }

  /* footer */
  .strip-footer { font-size: 11px; opacity: 0.4; padding-top: 6px; }

  @media (max-width: 960px) {
    main { grid-template-columns: 1fr; }
    .left-panel { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <div class="logo-mark">OFP</div>
  <h1>Flight <span>Strip</span></h1>
  <span class="save-badge" id="saveBadge">&#10003; SAVED</span>
</header>

<main>
<!-- ═══════ LEFT PANEL ═══════ -->
<div class="left-panel">

  <div>
    <div class="section-label">01 · SimBrief</div>
    <div style="margin-bottom:5px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)">Pilot ID or Username</div>
    <input class="sb-input" id="sbInput" type="text" placeholder="e.g. 123456 or johndoe" oninput="savePref('sbInput',this.value)">
    <button class="btn-sb" id="sbFetchBtn" onclick="fetchSimbrief()">FETCH LATEST OFP</button>
    <div class="loading-bar" id="loadingBar"></div>
    <div class="sb-hint" style="margin-top:8px">Numeric = Pilot ID · Text = Username<br>Find your Pilot ID: SimBrief → Account</div>
  </div>

  <div>
    <div class="section-label">02 · Weight Units</div>
    <div class="unit-toggle">
      <button class="unit-btn active" id="unitT"  onclick="setUnit('T')">TONNES</button>
      <button class="unit-btn"        id="unitKG" onclick="setUnit('KG')">KG</button>
      <button class="unit-btn"        id="unitLB" onclick="setUnit('LB')">LB</button>
    </div>
  </div>

  <div>
    <div class="section-label">03 · Generate</div>
    <button class="btn-generate" id="generateBtn" disabled>GENERATE STRIP</button>
  </div>

  <div>
    <button class="btn-clear" onclick="clearAll()">&#128465; CLEAR ALL</button>
  </div>

  <div>
    <div class="section-label">Status</div>
    <div class="status-box" id="statusBox"><span class="ok">&gt;</span> Ready.</div>
  </div>

</div>

<!-- ═══════ RIGHT PANEL ═══════ -->
<div class="right-panel">
  <div class="strip-header">
    <h2>Flight Strip</h2>
    <div class="strip-actions">
      <button class="btn-action" id="copyBtn"  style="display:none" onclick="copyStrip()">COPY TEXT</button>
      <button class="btn-action" id="printBtn" style="display:none" onclick="printStrip()">PRINT</button>
    </div>
  </div>
  <div id="stripOutput">
    <div class="strip-placeholder">
      <span class="big">&#9992;</span>
      Enter your SimBrief Pilot ID or username,<br>
      click <strong>FETCH LATEST OFP</strong>, then<br>
      <strong>GENERATE STRIP</strong>.
    </div>
  </div>
</div>
</main>

<script>
// ════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════
const LS_KEY  = 'flightstrip_v4';
const LS_PREF = 'flightstrip_prefs_v4';

// Airline lookup: ICAO prefix → { name, callsign }
const AIRLINES = {
  'UKV': { name: 'Skyways',      callsign: 'Skyways'   },
  'CET': { name: 'Cetan',        callsign: 'Skyhawk'   },
  // add more below as needed
};

// SELCAL character pools per real-world rules
// Valid chars: A-S excluding I, N, O (standard SELCAL alphabet = A B C D E F G H J K L M P Q R S T)
const SELCAL_CHARS = ['A','B','C','D','E','F','G','H','J','K','L','M','P','Q','R','S','T'];

// ════════════════════════════════════
//  STATE
// ════════════════════════════════════
let currentUnit = 'T';
let rawData     = null;

// ════════════════════════════════════
//  PERSISTENCE
// ════════════════════════════════════
function savePref(key, val) {
  const p = loadPrefs(); p[key] = val;
  localStorage.setItem(LS_PREF, JSON.stringify(p));
}
function loadPrefs() {
  try { return JSON.parse(localStorage.getItem(LS_PREF) || '{}'); } catch { return {}; }
}

function saveStripState() {
  if (!rawData) return;
  const state = { rawData, unit: currentUnit, fields: collectFields(), steps: collectSteps() };
  localStorage.setItem(LS_KEY, JSON.stringify(state));
  flashSave();
}
function loadStripState() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || 'null'); } catch { return null; }
}

const FIELD_IDS = ['fRwy','fSid','fCm','fDep2','fSq','fGateD','fGateA',
                   'fAtisD','fAtisA','fInitAlt','fRte',
                   'fTimeOut','fTimeOff','fTimeOn','fTimeIn',
                   'fDepWx','fArrWx','fAltWx','fNotes','fSelcal'];

function collectFields() {
  const out = {};
  FIELD_IDS.forEach(id => { const el = G(id); if (el) out[id] = el.value; });
  return out;
}
function restoreFields(fields) {
  if (!fields) return;
  Object.entries(fields).forEach(([id, val]) => { const el = G(id); if (el) el.value = val; });
}

function collectSteps() {
  const rows = document.querySelectorAll('.step-row');
  return Array.from(rows).map(r => ({
    wp: r.querySelector('.step-wp')?.value || '',
    fl: r.querySelector('.step-fl')?.value || '',
  }));
}
function restoreSteps(steps) {
  if (!steps || !steps.length) return;
  steps.forEach(s => addStepRow(s.wp, s.fl));
}

function flashSave() {
  const b = G('saveBadge'); b.classList.add('show');
  clearTimeout(b._t); b._t = setTimeout(() => b.classList.remove('show'), 2000);
}

// ════════════════════════════════════
//  INIT
// ════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  const prefs = loadPrefs();
  if (prefs.sbInput) G('sbInput').value = prefs.sbInput;
  if (prefs.unit)    setUnit(prefs.unit, false);

  const saved = loadStripState();
  if (saved) {
    rawData = saved.rawData;
    if (saved.unit) setUnit(saved.unit, false);
    buildStrip(rawData);
    restoreFields(saved.fields);
    restoreSteps(saved.steps);
    G('generateBtn').disabled = false;
    log('ok', 'Restored previous strip from browser storage.');
  }
});

// ════════════════════════════════════
//  SIMBRIEF
// ════════════════════════════════════
async function fetchSimbrief() {
  const val = G('sbInput').value.trim();
  if (!val) { log('err','Enter a Pilot ID or username.'); return; }

  const btn = G('sbFetchBtn');
  btn.disabled = true; btn.textContent = 'FETCHING...';
  G('loadingBar').classList.add('active');
  log('ok','Connecting to SimBrief...');

  try {
    const isId = /^\d+$/.test(val);
    const param = isId ? `userid=${encodeURIComponent(val)}` : `username=${encodeURIComponent(val)}`;
    const resp  = await fetch(`https://www.simbrief.com/api/xml.fetcher.php?${param}&json=1`);
    if (!resp.ok) throw new Error(`SimBrief HTTP ${resp.status}`);
    const sb = await resp.json();
    if (sb.fetch?.status === 'Error' || !sb.general) throw new Error(sb.fetch?.message || 'No OFP found.');

    rawData = parseSimbriefData(sb);
    G('generateBtn').disabled = false;
    log('ok',`Loaded: ${rawData.callsign} · ${rawData.dep}→${rawData.dest} · ${rawData.acType}`);
    log('warn',`Block: ${rawData.blockTime} · CI${rawData.ci} · FL${rawData.initFl}`);
  } catch(err) {
    log('err', err.message);
  } finally {
    btn.disabled = false; btn.textContent = 'FETCH LATEST OFP';
    G('loadingBar').classList.remove('active');
  }
}

function parseSimbriefData(sb) {
  const g      = sb.general     || {};
  const org    = sb.origin      || {};
  const dst    = sb.destination || {};
  const fuel   = sb.fuel        || {};
  const wts    = sb.weights     || {};
  const atc    = sb.atc         || {};
  const params = sb.params      || {};
  const times  = sb.times       || {};

  const altArr   = Array.isArray(sb.alternate) ? sb.alternate : (sb.alternate ? [sb.alternate] : []);
  const altnIcao = altArr[0]?.icao_code || altArr[0]?.icao || '---';

  // Weights in KG
  const zfwKg   = parseFloat(wts.est_zfw)    || 0;
  const lawKg   = parseFloat(wts.est_ldw)    || 0;
  const blockKg = parseFloat(fuel.plan_ramp) || parseFloat(fuel.totalfuel) || 0;
  const pax     = parseInt(wts.pax_count_actual || wts.pax_count || 0);
  const cargoKg = parseFloat(wts.cargo || wts.payload || 0);

  // Block time — prefer sched_out/sched_in diff; fall back to air_time (SECONDS) + taxi
  let blockMin = 0;
  const schedOut = parseInt(times.sched_out || org.sched_out || 0);
  const schedIn  = parseInt(times.sched_in  || dst.sched_in  || 0);
  if (schedOut && schedIn && schedIn > schedOut) {
    blockMin = Math.round((schedIn - schedOut) / 60);
  } else {
    // air_time is in SECONDS in SimBrief JSON
    const airSec  = parseInt(g.air_time || 0);
    const taxiOut = parseInt(org.taxi_out || 20);
    const taxiIn  = parseInt(dst.taxi_in  || 10);
    blockMin = Math.round(airSec / 60) + taxiOut + taxiIn;
  }
  const bH = Math.floor(blockMin / 60);
  const bM = blockMin % 60;
  const blockTime = `${String(bH).padStart(2,'0')}:${String(bM).padStart(2,'0')}`;

  // Scheduled times (UTC unix → HHMMz)
  function toUTCHHMM(unix) {
    if (!unix || unix === '0') return '';
    const d = new Date(parseInt(unix) * 1000);
    return String(d.getUTCHours()).padStart(2,'0') + String(d.getUTCMinutes()).padStart(2,'0') + 'z';
  }
  const timeOut = toUTCHHMM(times.sched_out || org.sched_out);
  const timeOff = toUTCHHMM(times.sched_off || org.sched_off);
  const timeOn  = toUTCHHMM(times.sched_on  || dst.sched_on);
  const timeIn  = toUTCHHMM(times.sched_in  || dst.sched_in);

  // Route & procedures
  const routeFull = (atc.route || g.route_ifps || '').trim();
  const depRwy    = org.plan_rwy   || '---';
  const sid       = org.sid_trans  || org.sid  || '---';
  const star      = dst.star_trans || dst.star || '';

  // Initial & step climb FLs
  // SimBrief gives fl_stepclimb as e.g. "GOKAB/0390/OTKIL/0410"
  // and initial cruise as general.initial_altitude or cruise_altitude
  const initFlRaw = g.initial_altitude || g.cruise_altitude || params.cruise_altitude || '';
  // parse: could be "39000" (feet) or "390"
  let initFl = '';
  if (initFlRaw) {
    const n = parseInt(initFlRaw);
    initFl = n > 1000 ? 'FL' + Math.round(n/100) : 'FL' + n;
  }

  // Step climbs from fl_stepclimb field e.g. "WAYPOINT/FL/WAYPOINT/FL"
  const stepRaw = g.stepclimb_string || atc.fl_stepclimb || '';
  const steps = [];
  if (stepRaw) {
    const parts = stepRaw.split('/');
    for (let i = 0; i < parts.length - 1; i += 2) {
      const wp = parts[i].trim();
      const fl = parts[i+1] ? ('FL' + parseInt(parts[i+1])) : '';
      if (wp && fl) steps.push({ wp, fl });
    }
  }

  // Aircraft type
  const acType = params.aircraft_icao || g.ac_icao || g.aircraft_icao
              || sb.aircraft?.icaocode || sb.aircraft?.name || '---';

  // Callsign & airline
  const icaoAirline = (g.icao_airline || '').toUpperCase();
  const flightNum   = g.flight_number || '';
  const callsign    = icaoAirline + flightNum || '---';
  const airlineInfo = AIRLINES[icaoAirline] || { name: icaoAirline || 'Unknown', callsign: icaoAirline };

  // SELCAL — try to get from SimBrief, otherwise generate
  // Coerce to string first — SimBrief can return selcal as an object/array
  const selcalRaw = sb.aircraft?.selcal || g.selcal || params.selcal || '';
  const selcalStr = (typeof selcalRaw === 'string') ? selcalRaw.trim()
                  : (typeof selcalRaw === 'object' && selcalRaw !== null) ? '' : String(selcalRaw || '').trim();
  const selcal    = selcalStr ? selcalStr.toUpperCase() : generateSelcal();

  return {
    callsign, acType, dep: org.icao_code || '---', dest: dst.icao_code || '---',
    zfwKg, lawKg, blockKg, pax, cargoKg,
    blockTime, timeOut, timeOff, timeOn, timeIn,
    route: routeFull, depRwy, sid, star,
    altn: altnIcao, ci: g.costindex || '---',
    initFl, steps,
    airlineName: airlineInfo.name, airlineCallsign: airlineInfo.callsign,
    icaoAirline, selcal,
  };
}

// ════════════════════════════════════
//  SELCAL GENERATOR
// ════════════════════════════════════
// Real-world rules: 4 chars, 2 pairs, chars within each pair in ascending order,
// no char repeated, pairs themselves in ascending order (by first char).
function generateSelcal() {
  // Pick 4 distinct characters
  const pool = [...SELCAL_CHARS];
  const pick = [];
  while (pick.length < 4) {
    const idx = Math.floor(Math.random() * pool.length);
    pick.push(pool.splice(idx, 1)[0]);
  }
  pick.sort(); // sort all 4 so we can split into valid pairs
  // pair1 = pick[0]+pick[1], pair2 = pick[2]+pick[3] — both in order, pair1 < pair2 ✓
  return `${pick[0]}${pick[1]}-${pick[2]}${pick[3]}`;
}

// ════════════════════════════════════
//  UNIT TOGGLE
// ════════════════════════════════════
function setUnit(u, persist = true) {
  currentUnit = u;
  ['T','KG','LB'].forEach(x => G('unit'+x).classList.toggle('active', x === u));
  if (persist) savePref('unit', u);
  if (rawData) updateWeightDisplay();
}

function fmtWt(kg) {
  if (currentUnit === 'T')  return (kg/1000).toFixed(1) + 'T';
  if (currentUnit === 'KG') return Math.round(kg) + 'KG';
  if (currentUnit === 'LB') return Math.round(kg*2.20462) + 'LB';
}
function fmtWtShort(kg) {
  if (currentUnit === 'T')  return (kg/1000).toFixed(1);
  if (currentUnit === 'KG') return Math.round(kg).toString();
  if (currentUnit === 'LB') return Math.round(kg*2.20462).toString();
}

function updateWeightDisplay() {
  const set = (id, v) => { const el = G(id); if (el) el.textContent = v; };
  set('wZfw',   fmtWt(rawData.zfwKg));
  set('wBlock', fmtWt(rawData.blockKg));
  set('wLaw',   fmtWt(rawData.lawKg));
  set('wCargo', fmtWtShort(rawData.cargoKg));
}

// ════════════════════════════════════
//  GENERATE
// ════════════════════════════════════
G('generateBtn').addEventListener('click', () => {
  if (!rawData) return;
  buildStrip(rawData);
  saveStripState();
  log('ok', 'Strip built — all amber fields are editable, auto-saved.');
});

// ════════════════════════════════════
//  STRIP BUILDER
// ════════════════════════════════════
function buildStrip(d) {

  <!-- ── Weights ── -->

    <span class="strip-label" style="margin-left:14px">LWT:</span><span class="strip-value" id="wLaw">${fmtWt(d.lawKg)}</span>

    <span class="strip-label">P/C:</span>

    <span class="strip-value">${esc(d.blockTime)}</span>

  </div>

  <hr class="strip-sep">

  <!-- ── Times ── -->

    <span class="strip-label">OUT:</span>
    <input id="fTimeOut" class="sf w60" value="${esc(d.timeOut)}" placeholder="0000z" oninput="autoSave()">
    <span class="strip-label" style="margin-left:10px">OFF:</span>

  <!-- ── RTE ── -->
  <div class="strip-row">

    <span class="strip-label">STEP CLIMBS:</span>

// ════════════════════════════════════
//  STEP CLIMB ROWS
// ════════════════════════════════════
function addStepRow(wp = '', fl = '') {
  const body = G('stepBody');
  if (!body) return;
  const tr = document.createElement('tr');
  tr.className = 'step-row';
  tr.innerHTML = `
    <td><input class="sf step-wp" value="${esc(wp)}" placeholder="WAYPOINT / position" oninput="autoSave()"></td>
    <td><input class="sf step-fl w70" value="${esc(fl)}" placeholder="FL390" oninput="autoSave()"></td>
    <td><button class="btn-del-step" onclick="delStepRow(this)" title="Remove">&#x2715;</button></td>`;
  body.appendChild(tr);
}
function delStepRow(btn) {
  btn.closest('tr').remove();
  autoSave();
}

// ════════════════════════════════════
//  SELCAL REGEN
// ════════════════════════════════════
function regenSelcal() {
  const el = G('fSelcal');
  if (el) { el.value = generateSelcal(); autoSave(); }
}

// ════════════════════════════════════
//  AUTO-SAVE
// ════════════════════════════════════
let _saveTimer = null;
function autoSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(saveStripState, 700);
}

// ════════════════════════════════════
//  COPY
// ════════════════════════════════════
function copyStrip() {
  if (!rawData) return;
  const d   = rawData;
  const SEP = '-'.repeat(115);
  const get = id => { const el = G(id); return el ? el.value : ''; };

  // Steps
  const stepLines = collectSteps()
    .filter(s => s.wp || s.fl)
    .map(s => `  ${s.wp.padEnd(16)} ${s.fl}`)
    .join('\n') || '  (none)';

  const footer = `${d.callsign} ${d.airlineCallsign} / SELCAL ${get('fSelcal')} / SIMBRIEF`;

  const txt = [
    `| Flight ${d.callsign} | Type ${d.acType} | Route ${d.dep} - ${d.dest} | ${d.airlineName}`,
    '',SEP,
    `ZFW: ${fmtWt(d.zfwKg)}    BLOCK: ${fmtWt(d.blockKg)}    LWT: ${fmtWt(d.lawKg)}`,
    `P/C: ${d.pax}/${fmtWtShort(d.cargoKg)}    CI/M: ${d.ci}    BLOCK: ${d.blockTime}    INIT ALT: ${get('fInitAlt')}`,
    SEP,
    `OUT: ${get('fTimeOut')}    OFF: ${get('fTimeOff')}    ON: ${get('fTimeOn')}    IN: ${get('fTimeIn')}`,
    SEP,
    `RTE: ${get('fRte')}`,
    `STEP CLIMBS:\n${stepLines}`,
    SEP,
    `CLRNC: ${get('fRwy')}/${get('fSid')}  C/M: ${get('fCm')}  DEP: ${get('fDep2')}  SQ: ${get('fSq')}`,
    SEP,
    `GATE DEP: ${get('fGateD')}  ARR: ${get('fGateA')}    ATIS DEP: ${get('fAtisD')}  ARR: ${get('fAtisA')}`,
    SEP,
    `DEP: ${get('fDepWx')}`,
    `ARR: ${get('fArrWx')}`,
    `ALT: ${get('fAltWx')}`,
    SEP,
    `SELCAL: ${get('fSelcal')}`,
    SEP,
    `REMARKS: ${get('fNotes')}`,
    SEP,'',
    footer,
  ].join('\n');

  navigator.clipboard.writeText(txt).then(() => {
    const b = G('copyBtn'); b.textContent = 'COPIED ✓';
    setTimeout(() => b.textContent = 'COPY TEXT', 2000);
  });
}

// ════════════════════════════════════
//  PRINT
// ════════════════════════════════════

  const card = G('stripCard'); if (!card) return;
  const w = window.open('','_blank','width=960,height=800');
  w.document.write(`<html><head><title>Flight Strip</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    body{background:#fff;color:#000;font-family:'Share Tech Mono',monospace;padding:24px;font-size:12px}
    *{box-sizing:border-box}
    .strip-card{border:1px solid #000;border-radius:6px;padding:16px 20px}
    .strip-title-row,.strip-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:3px 0}
    hr{border:none;border-top:1px solid #bbb;margin:3px 0}
    input,textarea{border:1px solid #aaa;border-radius:2px;padding:2px 5px;font-family:inherit;font-size:12px}
    textarea{width:100%;min-height:32px}
    .step-table{width:100%;border-collapse:collapse}
    .step-table th{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#888;padding:1px 4px;text-align:left}
    .step-table td{padding:2px 4px}
    .step-table input{width:100%}
    .strip-footer{font-size:10px;opacity:0.45;padding-top:5px}
    .btn-add-step,.btn-del-step,.btn-action,.btn-generate,.btn-sb,.btn-clear{display:none}
    .notes-label{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#777;margin-bottom:3px}
    .strip-label{color:#555;font-size:12px}
    .strip-value,.strip-static{font-size:12px}
    .sf{border:1px solid #aaa;border-radius:2px;padding:2px 5px;font-family:inherit;font-size:12px;color:#000;background:#fff}
    .xw{flex:1;min-width:80px}
    .tg-label{color:#555;font-size:12px}
  </style></head><body>${card.innerHTML}</body></html>`);
  w.document.close();
  w.onload = () => w.print();
}

// ════════════════════════════════════
//  CLEAR
// ════════════════════════════════════
function clearAll() {
  if (!confirm('Clear strip and all saved data?')) return;
  localStorage.removeItem(LS_KEY);
  rawData = null;
  G('stripOutput').innerHTML = `<div class="strip-placeholder"><span class="big">&#9992;</span>Strip cleared.</div>`;
  G('generateBtn').disabled = true;
  G('copyBtn').style.display  = 'none';
  G('printBtn').style.display = 'none';
  log('warn','Cleared.');
}

// ════════════════════════════════════
//  HELPERS
// ════════════════════════════════════
function log(type, msg) {
  const s = G('statusBox');
  s.innerHTML += `\n<span class="${type}">&gt;</span> ${msg}`;
  s.scrollTop = s.scrollHeight;
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function G(id) { return document.getElementById(id); }
</script>
</body>
</html>
